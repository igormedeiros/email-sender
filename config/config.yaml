database:
  host: localhost
  port: 5432
  user: postgres
  password: ${DB_PASSWORD}
  database: treineinsite

smtp:
  host: "smtplw.com.br"
  port: 587
  port_ssl: 465
  use_tls: True
  retry_attempts: 3
  retry_delay: 5  # Backoff exponencial: 5s, 10s, 20s
  retry_backoff: exponential  # Use exponential backoff
  send_timeout: 30  # Timeout socket SMTP (30s = mais estável para servidor lento)

email:
  sender: "mkt@envio.treineinsite.com.br"
  batch_delay: 30  # 30s entre lotes (pedida pelo usuário)
  batch_size: 200
  test_recipient: "igor.medeiros@gmail.com"
  public_domain: "mkt.treineinsite.com.br"
